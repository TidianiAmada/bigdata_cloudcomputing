# Atelier 3 (MongoDB + Spark) — socle utilisé aussi en local par les Ateliers 4.2 et 5.2.
# Version corrigée après le remplacement de bitnami/spark (indisponible) par apache/spark-py,
# cf. Solutions/Solution_Atelier_3.md pour le détail du diagnostic (AccessDeniedException, --host).
# Démarrage : docker compose -f docker-compose-mongo-spark.yml up -d
# Arrêt     : docker compose -f docker-compose-mongo-spark.yml down

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bigdata_net

  spark-master:
    image: apache/spark-py:latest
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master"]
    ports:
      - "8080:8080"   # interface web du master
      - "7077:7077"   # port de communication Spark
    volumes:
      - ./data:/data   # purchases.txt, réutilisé tel quel par les Ateliers 4.2 et 5.2
    networks:
      - bigdata_net

  spark-worker:
    image: apache/spark-py:latest
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--work-dir", "/tmp/spark-work"]
    depends_on:
      - spark-master
    volumes:
      - ./data:/data
    networks:
      - bigdata_net

volumes:
  mongo_data:

networks:
  bigdata_net:
    driver: bridge
